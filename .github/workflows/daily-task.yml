name: Daily Task Reminder

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 5:30 AM IST (midnight UTC)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Create Daily Reminder Issue
        run: |
          DAY_NUM=$(( ( $(date +%s) - $(date -d "2026-04-01" +%s) ) / 86400 + 1 ))
          
          if [ $DAY_NUM -lt 1 ] || [ $DAY_NUM -gt 240 ]; then
            echo "Not in active period (Day $DAY_NUM)"
            exit 0
          fi
          
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d "{
              \"title\": \"Day $DAY_NUM - Daily Tasks\",
              \"body\": \"**Day $DAY_NUM of 240**\n\n## Today's Tasks:\n\n**Hour 1 (6:00-7:00 AM):** DSA/LeetCode\n**Hour 2 (7:00-8:00 AM):** Theory\n**Hour 3-5 (9:00 PM-12:00 AM):** Project Work\n\nView full details: https://github.com/${{ github.repository }}/blob/main/tasks/day-$DAY_NUM.md\",
              \"labels\": [\"daily-task\"]
            }"